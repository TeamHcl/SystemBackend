spring.application.name=SystemBackend
server.port=${SERVER_PORT:8081}

# ===== H2 Configuration (Local Development) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fraud_detection_system}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Swathipapa@05}
# ===== PostgreSQL Configuration (Production) =====
# Point SPRING_DATASOURCE_URL to PostgreSQL to enable pgvector-backed fraud scoring.
# Example:
# SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/fraud_detection_system
# SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver

# ===== JPA/Hibernate Configuration =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
