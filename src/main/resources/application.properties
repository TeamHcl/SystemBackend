spring.application.name=SystemBackend

# ===== H2 Configuration (Local Development) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fraud_detection_system}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ===== PostgreSQL Configuration (Production) =====
# Uncomment the below and comment out H2 config for production
# spring.datasource.url=jdbc:postgresql://localhost:5432/fraud_detection_system
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driverClassName=org.postgresql.Driver

# ===== JPA/Hibernate Configuration =====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
